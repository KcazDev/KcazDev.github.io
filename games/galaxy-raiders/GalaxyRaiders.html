<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://code.createjs.com/1.0.0/createjs.min.js"></script>

    <title>GalaxyRaiders</title>
</head>

<body>

    <h1>GALAXY RAIDERS</h1>
    <div class="subtitle">★ DEFEND THE GALAXY ★</div>

    <div class="game-stage">

        <div class="side-panel">
            <div class="label">SCORING</div>
            <div style="color: #44ddff;">■ FAST</div><div>= 30 PTS</div>
            <div style="color: #ffee44;">■ MID</div><div>= 20 PTS</div>
            <div style="color: #ff4477;">■ TANK</div><div>= 10 PTS</div>
            <div style="color: #ff66ff;">▲ UFO</div><div>= 200 PTS</div>
            <div style="color: #ff66ff;">★ BOSS</div><div>= 1000 PTS</div>
            <br>
            <div class="label">POWER-UPS</div>
            <div style="color: #ffee44;">★ TRIPLE</div>
            <div style="color: #00ffff;">★ RAPID</div>
            <div style="color: #39ff14;">★ SHIELD</div>
        </div>

        <div class="game-frame">
            <canvas id="gameCanvas" width="720" height="540"></canvas>
        </div>

        <div class="side-panel">
            <div class="label">LEADERBOARD</div>
            <div id="leaderboardList" style="font-size: 8px; line-height: 1.8; text-align: left; padding: 0 6px;"></div>
            <br>
            <div class="label">PILOT</div>
            <div>KCAZ</div>
            <br>
            <div class="label">STATUS</div>
            <div class="blink" style="color: #39ff14;">&#x25CF; ONLINE</div>
        </div>

    </div>

    <div class="controls">
        <div><span class="key">&larr; &rarr;</span> MOVE</div>
        <div><span class="key">SPACE</span> FIRE</div>
        <div><span class="key">R</span> RESTART</div>
    </div>

    <div class="footer">&copy; KCAZ INDUSTRIES &middot; 2026 &middot; ARCADE EDITION</div>

    <script>

        // ========== STATE ==========
        let gameState = "start";   // "start" | "playing" | "gameOver" | "nameEntry"
        let score = 0;
        let lives = 3;
        let wave = 1;
        let combo = 0;
        let shakeAmount = 0;

        let powerupActive = null;
        let powerupTimer = 0;
        let shootCooldown = 0;

        //leaderboard — stored as array of { name, score } in localStorage
        let leaderboard = JSON.parse(localStorage.getItem("galaxyRaidersBoard")) || [];
        let nameEntryBuffer = "AAA";
        let nameEntryIndex = 0;

        // ========== STAGE ==========
        const canvas = document.getElementById('gameCanvas');
        const stage = new createjs.Stage(canvas);
        createjs.Ticker.framerate = 60;
        createjs.Ticker.timingMode = createjs.Ticker.RAF_SYNCHED;

        // ========== SOUND ==========
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(freq, duration, type, volume) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type || "square";
            osc.frequency.value = freq;
            gain.gain.value = volume || 0.1;
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        function sfxShoot()      { playSound(800, 0.1, "square", 0.06); }
        function sfxEnemyHit()   { playSound(200, 0.15, "sawtooth", 0.1); }
        function sfxPlayerHit()  { playSound(80, 0.4, "sawtooth", 0.18); }
        function sfxWaveClear()  { playSound(660, 0.2, "triangle", 0.15); setTimeout(() => playSound(880, 0.3, "triangle", 0.15), 150); }
        function sfxEnemyShoot() { playSound(300, 0.08, "square", 0.04); }
        function sfxCombo(n)     { playSound(600 + n * 80, 0.1, "triangle", 0.1); }
        function sfxPowerup()    { playSound(440, 0.1, "triangle", 0.1); setTimeout(() => playSound(880, 0.15, "triangle", 0.1), 80); }
        function sfxUFO()        { playSound(1200, 0.05, "sine", 0.06); }
        function sfxBossHit()    { playSound(120, 0.2, "sawtooth", 0.15); }
        function sfxNameMove()   { playSound(440, 0.05, "square", 0.05); }
        function sfxNameSelect() { playSound(660, 0.08, "square", 0.08); }

        // ========== MUSIC LOOP ==========
        // Simple chiptune bass-line that loops while playing
        let musicTimer = 0;
        let musicStep = 0;
        const bassLine = [110, 110, 165, 110, 130, 110, 165, 130]; //A2 pentatonic-ish
        const leadLine = [440, 0, 523, 0, 587, 0, 659, 523, 440, 0, 392, 440, 0, 0, 0, 0];
        let leadStep = 0;
        let musicPlaying = false;

        function musicTick() {
            if (!musicPlaying) return;
            musicTimer++;

            //bass note every 30 frames (half-second)
            if (musicTimer % 30 === 0) {
                playSound(bassLine[musicStep], 0.25, "triangle", 0.05);
                musicStep = (musicStep + 1) % bassLine.length;
            }
            //lead note every 15 frames (quarter-second)
            if (musicTimer % 15 === 0) {
                const note = leadLine[leadStep];
                if (note > 0) playSound(note, 0.12, "square", 0.025);
                leadStep = (leadStep + 1) % leadLine.length;
            }
        }

        function startMusic() { musicPlaying = true; }
        function stopMusic()  { musicPlaying = false; }

        // ========== STARFIELD ==========
        const stars = [];
        for (let i = 0; i < 80; i++) {
            const star = new createjs.Shape();
            const size = Math.random() < 0.8 ? 1 : 2;
            star.graphics.beginFill("#ffffff").drawRect(0, 0, size, size);
            star.x = Math.random() * 720;
            star.y = Math.random() * 540;
            star.alpha = 0.3 + Math.random() * 0.6;
            star.speed = 0.3 + Math.random() * 1.5;
            stage.addChild(star);
            stars.push(star);
        }

        // ========== PLAYER ==========
        const player = new createjs.Shape();
        player.graphics
            .beginStroke("#39ff14").setStrokeStyle(2)
            .beginFill("rgba(57, 255, 20, 0.4)")
            .moveTo(0, -15).lineTo(-25, 12).lineTo(-10, 6)
            .lineTo(0, 10).lineTo(10, 6).lineTo(25, 12)
            .closePath().endStroke();
        player.graphics.beginFill("#39ff14").drawRect(-3, -8, 6, 12);
        player.x = 360;
        player.y = 500;
        stage.addChild(player);

        const shield = new createjs.Shape();
        shield.graphics.beginStroke("#39ff14").setStrokeStyle(2).drawCircle(0, 0, 32);
        shield.alpha = 0;
        stage.addChild(shield);

        // ========== INPUT ==========
        const keys = {};

        window.addEventListener("keydown", function (event) {
            keys[event.code] = true;

            //start screen
            if (gameState === "start" && event.code === "Space") {
                gameState = "playing";
                stage.removeChild(startText);
                stage.removeChild(instructionText);
                renderLeaderboard();
                startMusic();
                return;
            }

            //name entry
            if (gameState === "nameEntry") {
                handleNameEntry(event.code);
                return;
            }

            //game over restart
            if (gameState === "gameOver" && event.code === "KeyR") {
                restartGame();
                return;
            }
        });

        window.addEventListener("keyup", function (event) {
            keys[event.code] = false;
        });

        // ========== NAME ENTRY HANDLING ==========
        function handleNameEntry(code) {
            if (code === "ArrowUp") {
                let c = nameEntryBuffer.charCodeAt(nameEntryIndex);
                c = c === 90 ? 65 : c + 1;  // wrap Z -> A
                nameEntryBuffer = setChar(nameEntryBuffer, nameEntryIndex, String.fromCharCode(c));
                sfxNameMove();
            } else if (code === "ArrowDown") {
                let c = nameEntryBuffer.charCodeAt(nameEntryIndex);
                c = c === 65 ? 90 : c - 1;  // wrap A -> Z
                nameEntryBuffer = setChar(nameEntryBuffer, nameEntryIndex, String.fromCharCode(c));
                sfxNameMove();
            } else if (code === "ArrowRight") {
                nameEntryIndex = (nameEntryIndex + 1) % 3;
                sfxNameMove();
            } else if (code === "ArrowLeft") {
                nameEntryIndex = (nameEntryIndex + 2) % 3;
                sfxNameMove();
            } else if (code === "Enter" || code === "Space") {
                submitScore();
                sfxNameSelect();
            }
            updateNameDisplay();
        }

        function setChar(str, i, ch) {
            return str.substring(0, i) + ch + str.substring(i + 1);
        }

        function submitScore() {
            leaderboard.push({ name: nameEntryBuffer, score: score });
            leaderboard.sort((a, b) => b.score - a.score);
            leaderboard = leaderboard.slice(0, 10);
            localStorage.setItem("galaxyRaidersBoard", JSON.stringify(leaderboard));
            renderLeaderboard();

            //transition to gameOver
            gameState = "gameOver";
            stage.removeChild(nameEntryTitle);
            stage.removeChild(nameEntryDisplay);
            stage.removeChild(nameEntryHint);
            stage.addChild(gameOverText);
            stage.addChild(restartText);
        }

        function updateNameDisplay() {
            //Build the visual: highlight current letter
            let display = "";
            for (let i = 0; i < 3; i++) {
                if (i === nameEntryIndex) display += "[" + nameEntryBuffer[i] + "]";
                else display += " " + nameEntryBuffer[i] + " ";
            }
            nameEntryDisplay.text = display;
        }

        function renderLeaderboard() {
            const el = document.getElementById("leaderboardList");
            if (leaderboard.length === 0) {
                el.innerHTML = "<div style='color: #555;'>NO SCORES YET</div>";
                return;
            }
            let html = "";
            for (let i = 0; i < leaderboard.length; i++) {
                const e = leaderboard[i];
                const rank = (i + 1).toString().padStart(2, "0");
                const name = e.name.padEnd(3, " ");
                const sc = e.score.toString().padStart(6, "0");
                html += `<div>${rank}. ${name} ${sc}</div>`;
            }
            el.innerHTML = html;
        }
        renderLeaderboard();

        // ========== ARRAYS ==========
        const enemies = [];
        const bullets = [];
        const enemyBullets = [];
        const particles = [];
        const powerups = [];
        const popups = [];
        const trails = [];
        const playerTrails = [];   //rocket trail
        const shockwaves = [];     //expanding rings (boss death, etc)
        let ufo = null;
        let ufoTimer = 0;
        let boss = null;
        let bossPhase = 1;
        let bossPatternTimer = 0;

        let enemyDirections = [1, -1, 1];
        let enemySpeed = 1;
        let enemyShootTimer = 0;
        let waveAnnounceTimer = 0;
        let waveAnnounceText = null;

        spawnEnemies();

        // ========== HUD ==========
        const waveText = new createjs.Text("Wave: 1", "14px 'Press Start 2P'", "#39ff14");
        waveText.textAlign = "center"; waveText.x = 360; waveText.y = 20;
        stage.addChild(waveText);

        const scoreText = new createjs.Text("Score: 0", "14px 'Press Start 2P'", "#39ff14");
        scoreText.x = 20; scoreText.y = 20;
        stage.addChild(scoreText);

        const livesText = new createjs.Text("Lives: 3", "14px 'Press Start 2P'", "#39ff14");
        livesText.textAlign = "right"; livesText.x = 700; livesText.y = 20;
        stage.addChild(livesText);

        const comboText = new createjs.Text("", "18px 'Press Start 2P'", "#ffee44");
        comboText.textAlign = "center"; comboText.x = 360; comboText.y = 60;
        stage.addChild(comboText);

        const powerupText = new createjs.Text("", "12px 'Press Start 2P'", "#ffee44");
        powerupText.textAlign = "center"; powerupText.x = 360; powerupText.y = 90;
        stage.addChild(powerupText);

        // ========== SCREENS ==========
        const startText = new createjs.Text("Press Space to Start", "20px 'Press Start 2P'", "#39ff14");
        startText.textAlign = "center"; startText.x = 360; startText.y = 250;
        stage.addChild(startText);

        const instructionText = new createjs.Text("Arrows to Move - Space to Shoot", "12px 'Press Start 2P'", "#39ff14");
        instructionText.textAlign = "center"; instructionText.x = 360; instructionText.y = 290;
        stage.addChild(instructionText);

        const gameOverText = new createjs.Text("GAME OVER", "36px 'Press Start 2P'", "#ff4477");
        gameOverText.textAlign = "center"; gameOverText.x = 360; gameOverText.y = 250;

        const restartText = new createjs.Text("Press R to Restart", "14px 'Press Start 2P'", "#39ff14");
        restartText.textAlign = "center"; restartText.x = 360; restartText.y = 300;

        //name entry screens (created once, shown on demand)
        const nameEntryTitle = new createjs.Text("NEW HIGH SCORE!", "24px 'Press Start 2P'", "#ffee44");
        nameEntryTitle.textAlign = "center"; nameEntryTitle.x = 360; nameEntryTitle.y = 200;
        nameEntryTitle.shadow = new createjs.Shadow("#ffee44", 0, 0, 12);

        const nameEntryDisplay = new createjs.Text("[A] A  A", "32px 'Press Start 2P'", "#39ff14");
        nameEntryDisplay.textAlign = "center"; nameEntryDisplay.x = 360; nameEntryDisplay.y = 280;
        nameEntryDisplay.shadow = new createjs.Shadow("#39ff14", 0, 0, 10);

        const nameEntryHint = new createjs.Text("UP/DOWN: LETTER  LEFT/RIGHT: POSITION  ENTER: SUBMIT", "9px 'Press Start 2P'", "#39ff14");
        nameEntryHint.textAlign = "center"; nameEntryHint.x = 360; nameEntryHint.y = 360;

        // ========== HELPERS ==========
        function spawnExplosion(x, y, color, count) {
            count = count || 12;
            for (let i = 0; i < count; i++) {
                const p = new createjs.Shape();
                const size = 2 + Math.random() * 3;
                p.graphics.beginFill(color).drawRect(-size/2, -size/2, size, size);
                p.x = x; p.y = y;
                const angle = Math.random() * Math.PI * 2;
                const speed = 1 + Math.random() * 4;
                p.vx = Math.cos(angle) * speed;
                p.vy = Math.sin(angle) * speed;
                p.life = 30 + Math.random() * 20;
                stage.addChild(p);
                particles.push(p);
            }
        }

        function spawnShockwave(x, y, color) {
            const s = new createjs.Shape();
            s.x = x; s.y = y;
            s.color = color;
            s.radius = 5;
            s.alpha = 1;
            stage.addChild(s);
            shockwaves.push(s);
        }

        function spawnPopup(x, y, text, color) {
            const t = new createjs.Text(text, "14px 'Press Start 2P'", color || "#ffee44");
            t.textAlign = "center";
            t.x = x; t.y = y;
            t.life = 50;
            t.shadow = new createjs.Shadow(color || "#ffee44", 0, 0, 8);
            stage.addChild(t);
            popups.push(t);
        }

        function spawnPowerup(x, y) {
            const types = ["triple", "rapid", "shield"];
            const type = types[Math.floor(Math.random() * types.length)];
            const colors = { triple: "#ffee44", rapid: "#00ffff", shield: "#39ff14" };
            const p = new createjs.Shape();
            p.graphics
                .beginStroke(colors[type]).setStrokeStyle(2)
                .beginFill("rgba(0,0,0,0.5)")
                .drawCircle(0, 0, 12).endStroke();
            p.graphics.beginFill(colors[type])
                .moveTo(0, -7).lineTo(2, -2).lineTo(7, -2).lineTo(3, 2).lineTo(5, 7)
                .lineTo(0, 4).lineTo(-5, 7).lineTo(-3, 2).lineTo(-7, -2).lineTo(-2, -2)
                .closePath();
            p.x = x; p.y = y;
            p.type = type;
            stage.addChild(p);
            powerups.push(p);
        }

        function activatePowerup(type) {
            powerupActive = type;
            powerupTimer = 600;
            const labels = { triple: "TRIPLE SHOT!", rapid: "RAPID FIRE!", shield: "SHIELD!" };
            const colors = { triple: "#ffee44", rapid: "#00ffff", shield: "#39ff14" };
            powerupText.text = labels[type];
            powerupText.color = colors[type];
            if (type === "shield") shield.alpha = 1;
            sfxPowerup();
        }

        function fireBullet(x, y) {
            const bullet = new createjs.Shape();
            bullet.graphics
                .beginFill("rgba(57, 255, 20, 0.5)").drawRect(-3, -10, 6, 20)
                .beginFill("#39ff14").drawRect(-1, -8, 2, 16);
            bullet.x = x; bullet.y = y;
            bullet.color = "#39ff14";
            stage.addChild(bullet);
            bullets.push(bullet);
        }

        function announceWave(text) {
            if (waveAnnounceText) stage.removeChild(waveAnnounceText);
            waveAnnounceText = new createjs.Text(text, "48px 'Press Start 2P'", "#39ff14");
            waveAnnounceText.textAlign = "center";
            waveAnnounceText.x = 360; waveAnnounceText.y = 240;
            waveAnnounceText.shadow = new createjs.Shadow("#39ff14", 0, 0, 20);
            waveAnnounceText.alpha = 0;
            stage.addChild(waveAnnounceText);
            waveAnnounceTimer = 90;
        }

        // ========== LEADERBOARD CHECK ==========
        function isHighScore(s) {
            if (leaderboard.length < 10) return true;
            return s > leaderboard[leaderboard.length - 1].score;
        }

        // ========== END / RESTART ==========
        function endGame(won) {
            stopMusic();

            if (isHighScore(score) && score > 0) {
                //prompt for name
                gameState = "nameEntry";
                nameEntryBuffer = "AAA";
                nameEntryIndex = 0;
                stage.addChild(nameEntryTitle);
                stage.addChild(nameEntryDisplay);
                stage.addChild(nameEntryHint);
                updateNameDisplay();
            } else {
                gameState = "gameOver";
                if (won) {
                    gameOverText.text = "YOU SAVED THE WORLD!";
                    gameOverText.color = "#39ff14";
                } else {
                    gameOverText.text = "GAME OVER";
                    gameOverText.color = "#ff4477";
                }
                stage.addChild(gameOverText);
                stage.addChild(restartText);
            }
        }

        function restartGame() {
            for (let i = 0; i < bullets.length; i++)      stage.removeChild(bullets[i]);
            for (let i = 0; i < enemyBullets.length; i++) stage.removeChild(enemyBullets[i]);
            for (let i = 0; i < enemies.length; i++)      stage.removeChild(enemies[i]);
            for (let i = 0; i < particles.length; i++)    stage.removeChild(particles[i]);
            for (let i = 0; i < powerups.length; i++)     stage.removeChild(powerups[i]);
            for (let i = 0; i < popups.length; i++)       stage.removeChild(popups[i]);
            for (let i = 0; i < trails.length; i++)       stage.removeChild(trails[i]);
            for (let i = 0; i < playerTrails.length; i++) stage.removeChild(playerTrails[i]);
            for (let i = 0; i < shockwaves.length; i++)   stage.removeChild(shockwaves[i]);
            if (ufo)  { stage.removeChild(ufo); ufo = null; }
            if (boss) { stage.removeChild(boss); if (boss.bar) stage.removeChild(boss.bar); if (boss.barBg) stage.removeChild(boss.barBg); boss = null; }

            bullets.length = 0; enemyBullets.length = 0; enemies.length = 0;
            particles.length = 0; powerups.length = 0; popups.length = 0;
            trails.length = 0; playerTrails.length = 0; shockwaves.length = 0;

            spawnEnemies();
            enemyDirections = [1, -1, 1];
            enemySpeed = 1;
            powerupActive = null;
            powerupTimer = 0;
            shield.alpha = 0;
            powerupText.text = "";
            bossPhase = 1;
            bossPatternTimer = 0;

            player.x = 360; player.y = 500;
            score = 0; lives = 3; wave = 1; combo = 0;
            scoreText.text = "Score: 0";
            livesText.text = "Lives: 3";
            waveText.text = "Wave: 1";
            comboText.text = "";

            stage.removeChild(gameOverText);
            stage.removeChild(restartText);

            gameState = "playing";
            startMusic();
        }

        // ========== ENEMY SPAWN ==========
        function spawnEnemies() {
            if (wave >= 5) {
                spawnBoss();
                return;
            }
            const rowConfig = [
                { color: "#44ddff", points: 30, size: 12 },
                { color: "#ffee44", points: 20, size: 14 },
                { color: "#ff4477", points: 10, size: 16 },
            ];
            for (let row = 0; row < 3; row++) {
                const cfg = rowConfig[row];
                for (let i = 0; i < 8; i++) {
                    const enemy = new createjs.Shape();
                    const s = cfg.size;
                    enemy.graphics
                        .beginStroke(cfg.color).setStrokeStyle(2)
                        .beginFill("rgba(0,0,0,0.3)")
                        .moveTo(-s, -s*0.7).lineTo(-s, s*0.3).lineTo(-s*1.3, s*0.7)
                        .lineTo(-s*0.6, s*0.5).lineTo(-s*0.3, s*0.8).lineTo(s*0.3, s*0.8)
                        .lineTo(s*0.6, s*0.5).lineTo(s*1.3, s*0.7).lineTo(s, s*0.3)
                        .lineTo(s, -s*0.7).lineTo(s*0.5, -s*0.7).lineTo(s*0.5, -s*0.3)
                        .lineTo(-s*0.5, -s*0.3).lineTo(-s*0.5, -s*0.7)
                        .closePath().endStroke();
                    enemy.graphics.beginFill(cfg.color)
                        .drawRect(-s*0.5, 0, 3, 3).drawRect(s*0.2, 0, 3, 3);
                    enemy.x = 100 + i * 70 + (row % 2) * 35;
                    enemy.y = 80 + row * 50;
                    enemy.row = row;
                    enemy.points = cfg.points;
                    enemy.color = cfg.color;
                    stage.addChild(enemy);
                    enemies.push(enemy);
                }
            }
            enemySpeed = 1 + (wave - 1) * 0.5;
            enemyDirections = [1, -1, 1];
        }

        function spawnBoss() {
            boss = new createjs.Shape();
            boss.graphics
                .beginStroke("#ff66ff").setStrokeStyle(3)
                .beginFill("rgba(255, 102, 255, 0.3)")
                .moveTo(-80, -30).lineTo(-100, 0).lineTo(-80, 30).lineTo(-50, 40)
                .lineTo(-30, 50).lineTo(30, 50).lineTo(50, 40).lineTo(80, 30)
                .lineTo(100, 0).lineTo(80, -30).lineTo(40, -40).lineTo(-40, -40)
                .closePath().endStroke();
            boss.graphics.beginFill("#ff66ff")
                .drawRect(-40, 0, 12, 12).drawRect(28, 0, 12, 12);
            boss.x = 360; boss.y = 120;
            boss.vx = 2;
            boss.hp = 40;
            boss.maxHp = 40;
            stage.addChild(boss);
            boss.barBg = new createjs.Shape();
            boss.barBg.graphics.beginFill("#330011").drawRect(0, 0, 400, 12);
            boss.barBg.x = 160; boss.barBg.y = 50;
            stage.addChild(boss.barBg);
            boss.bar = new createjs.Shape();
            boss.bar.graphics.beginFill("#ff66ff").drawRect(0, 0, 400, 12);
            boss.bar.x = 160; boss.bar.y = 50;
            stage.addChild(boss.bar);

            bossPhase = 1;
            bossPatternTimer = 0;
        }

        // ========== GAME LOOP ==========
        function tick(event) {

            //music
            musicTick();

            //stars
            for (let i = 0; i < stars.length; i++) {
                stars[i].y += stars[i].speed;
                if (stars[i].y > 540) { stars[i].y = 0; stars[i].x = Math.random() * 720; }
            }

            //particles
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx; p.y += p.vy; p.life--;
                p.alpha = p.life / 50;
                if (p.life <= 0) { stage.removeChild(p); particles.splice(i, 1); }
            }

            //popups
            for (let i = popups.length - 1; i >= 0; i--) {
                const t = popups[i];
                t.y -= 1; t.life--;
                t.alpha = t.life / 50;
                if (t.life <= 0) { stage.removeChild(t); popups.splice(i, 1); }
            }

            //bullet trails
            for (let i = trails.length - 1; i >= 0; i--) {
                trails[i].alpha -= 0.05;
                if (trails[i].alpha <= 0) { stage.removeChild(trails[i]); trails.splice(i, 1); }
            }

            //player rocket trails
            for (let i = playerTrails.length - 1; i >= 0; i--) {
                playerTrails[i].alpha -= 0.04;
                playerTrails[i].y += 1;
                if (playerTrails[i].alpha <= 0) {
                    stage.removeChild(playerTrails[i]);
                    playerTrails.splice(i, 1);
                }
            }

            //shockwaves expand and fade
            for (let i = shockwaves.length - 1; i >= 0; i--) {
                const s = shockwaves[i];
                s.radius += 8;
                s.alpha -= 0.04;
                s.graphics.clear()
                    .beginStroke(s.color).setStrokeStyle(3)
                    .drawCircle(0, 0, s.radius);
                if (s.alpha <= 0) { stage.removeChild(s); shockwaves.splice(i, 1); }

                //destroy enemy bullets caught by shockwave
                if (s.alpha > 0) {
                    for (let j = enemyBullets.length - 1; j >= 0; j--) {
                        const dx = enemyBullets[j].x - s.x;
                        const dy = enemyBullets[j].y - s.y;
                        const d = Math.sqrt(dx*dx + dy*dy);
                        if (d < s.radius && d > s.radius - 20) {
                            stage.removeChild(enemyBullets[j]);
                            enemyBullets.splice(j, 1);
                        }
                    }
                }
            }

            //screen shake
            if (shakeAmount > 0) {
                stage.x = (Math.random() - 0.5) * shakeAmount * 2;
                stage.y = (Math.random() - 0.5) * shakeAmount * 2;
                shakeAmount *= 0.9;
                if (shakeAmount < 0.5) { shakeAmount = 0; stage.x = 0; stage.y = 0; }
            }

            //wave announcement
            if (waveAnnounceTimer > 0) {
                waveAnnounceTimer--;
                if (waveAnnounceText) {
                    if (waveAnnounceTimer > 60) waveAnnounceText.alpha = (90 - waveAnnounceTimer) / 30;
                    else if (waveAnnounceTimer < 30) waveAnnounceText.alpha = waveAnnounceTimer / 30;
                    else waveAnnounceText.alpha = 1;
                    if (waveAnnounceTimer === 0) {
                        stage.removeChild(waveAnnounceText);
                        waveAnnounceText = null;
                    }
                }
            }

            if (gameState === "playing") {

                //player movement
                if (keys["ArrowLeft"])  player.x -= 5;
                if (keys["ArrowRight"]) player.x += 5;
                if (player.x < 25) player.x = 25;
                if (player.x > 695) player.x = 695;

                //ROCKET TRAIL — emit a flame particle behind the ship every frame
                if (Math.random() < 0.8) {
                    const flame = new createjs.Shape();
                    const size = 2 + Math.random() * 3;
                    const flameColor = Math.random() < 0.5 ? "#ffaa00" : "#ff4400";
                    flame.graphics.beginFill(flameColor).drawRect(-size/2, -size/2, size, size);
                    flame.x = player.x + (Math.random() - 0.5) * 8;
                    flame.y = player.y + 10;
                    flame.alpha = 0.8;
                    stage.addChild(flame);
                    playerTrails.push(flame);
                }

                //shield follows
                if (shield.alpha > 0) { shield.x = player.x; shield.y = player.y; }

                //firing
                if (shootCooldown > 0) shootCooldown--;
                if (keys["Space"] && shootCooldown <= 0) {
                    if (powerupActive === "triple") {
                        fireBullet(player.x, player.y - 20);
                        fireBullet(player.x - 15, player.y - 15);
                        fireBullet(player.x + 15, player.y - 15);
                    } else {
                        fireBullet(player.x, player.y - 20);
                    }
                    sfxShoot();
                    shootCooldown = powerupActive === "rapid" ? 4 : 12;
                }

                //bullet trails
                for (let i = 0; i < bullets.length; i++) {
                    if (Math.random() < 0.5) {
                        const t = new createjs.Shape();
                        t.graphics.beginFill(bullets[i].color).drawRect(-1, -4, 2, 8);
                        t.x = bullets[i].x; t.y = bullets[i].y;
                        t.alpha = 0.4;
                        stage.addChild(t);
                        trails.push(t);
                    }
                }

                //powerup timer
                if (powerupTimer > 0) {
                    powerupTimer--;
                    if (powerupTimer === 0) {
                        powerupActive = null;
                        powerupText.text = "";
                        shield.alpha = 0;
                    }
                }

                //powerups falling
                for (let i = powerups.length - 1; i >= 0; i--) {
                    powerups[i].y += 2;
                    powerups[i].rotation += 5;
                    if (powerups[i].y > 540) {
                        stage.removeChild(powerups[i]);
                        powerups.splice(i, 1);
                        continue;
                    }
                    if (Math.abs(powerups[i].x - player.x) < 25 &&
                        Math.abs(powerups[i].y - player.y) < 18) {
                        activatePowerup(powerups[i].type);
                        stage.removeChild(powerups[i]);
                        powerups.splice(i, 1);
                    }
                }

                //UFO (non-boss waves)
                if (!boss) {
                    ufoTimer++;
                    if (ufoTimer > 600 && !ufo && Math.random() < 0.005) {
                        ufo = new createjs.Shape();
                        ufo.graphics
                            .beginStroke("#ff66ff").setStrokeStyle(2)
                            .beginFill("rgba(255, 102, 255, 0.4)")
                            .moveTo(-25, 0).lineTo(-15, -8).lineTo(15, -8).lineTo(25, 0)
                            .lineTo(15, 8).lineTo(-15, 8).closePath().endStroke();
                        ufo.graphics.beginFill("#ff66ff").drawRect(-3, -3, 6, 6);
                        ufo.x = -30; ufo.y = 50; ufo.vx = 3;
                        stage.addChild(ufo);
                        ufoTimer = 0;
                    }
                    if (ufo) {
                        ufo.x += ufo.vx;
                        if (Math.random() < 0.3) sfxUFO();
                        if (ufo.x > 750) { stage.removeChild(ufo); ufo = null; }
                    }
                }

                //regular enemy logic
                if (!boss) {
                    const rowHitEdge = [false, false, false];
                    for (let i = 0; i < enemies.length; i++) {
                        const row = enemies[i].row;
                        enemies[i].x += enemySpeed * enemyDirections[row];
                        if (enemies[i].x > 705 || enemies[i].x < 15) rowHitEdge[row] = true;
                    }
                    for (let r = 0; r < rowHitEdge.length; r++) {
                        if (rowHitEdge[r]) {
                            enemyDirections[r] *= -1;
                            for (let i = 0; i < enemies.length; i++) {
                                if (enemies[i].row === r) enemies[i].y += 20;
                            }
                        }
                    }

                    enemyShootTimer++;
                    const shootChance = 60 - wave * 5;
                    if (enemyShootTimer > Math.max(15, shootChance) && enemies.length > 0) {
                        enemyShootTimer = 0;
                        const shooter = enemies[Math.floor(Math.random() * enemies.length)];
                        const eb = new createjs.Shape();
                        eb.graphics
                            .beginFill("rgba(255, 68, 119, 0.5)").drawRect(-3, -8, 6, 16)
                            .beginFill("#ff4477").drawRect(-1, -6, 2, 12);
                        eb.x = shooter.x; eb.y = shooter.y + 15;
                        stage.addChild(eb);
                        enemyBullets.push(eb);
                        sfxEnemyShoot();
                    }

                    for (let i = 0; i < enemies.length; i++) {
                        if (enemies[i].y > 470) {
                            lives--;
                            livesText.text = "Lives: " + lives;
                            sfxPlayerHit();
                            shakeAmount = 8;
                            spawnExplosion(player.x, player.y, "#39ff14", 20);
                            if (lives <= 0) endGame(false);
                            else for (let j = 0; j < enemies.length; j++) enemies[j].y -= 200;
                            break;
                        }
                    }

                    if (enemies.length === 0) {
                        wave++;
                        waveText.text = "Wave: " + wave;
                        sfxWaveClear();
                        if (wave > 5) endGame(true);
                        else {
                            announceWave("WAVE " + wave);
                            spawnEnemies();
                        }
                    }
                }

                //BOSS — multi-phase patterns
                if (boss) {
                    boss.x += boss.vx;
                    if (boss.x > 620 || boss.x < 100) boss.vx *= -1;

                    //phase determined by HP
                    const hpPct = boss.hp / boss.maxHp;
                    if (hpPct > 0.66) bossPhase = 1;
                    else if (hpPct > 0.33) bossPhase = 2;
                    else bossPhase = 3;

                    bossPatternTimer++;

                    if (bossPhase === 1) {
                        //triple spread every 25 frames
                        if (bossPatternTimer > 25) {
                            bossPatternTimer = 0;
                            for (let i = -1; i <= 1; i++) {
                                const eb = new createjs.Shape();
                                eb.graphics
                                    .beginFill("rgba(255, 102, 255, 0.5)").drawRect(-3, -8, 6, 16)
                                    .beginFill("#ff66ff").drawRect(-1, -6, 2, 12);
                                eb.x = boss.x + i * 25;
                                eb.y = boss.y + 40;
                                eb.vx = i * 1.2;
                                stage.addChild(eb);
                                enemyBullets.push(eb);
                            }
                            sfxEnemyShoot();
                        }
                    } else if (bossPhase === 2) {
                        //spiral pattern — bullets fan in a circle
                        if (bossPatternTimer > 6) {
                            bossPatternTimer = 0;
                            const angle = (Date.now() / 100) % (Math.PI * 2);
                            for (let k = 0; k < 4; k++) {
                                const a = angle + (Math.PI / 2) * k;
                                const eb = new createjs.Shape();
                                eb.graphics
                                    .beginFill("rgba(255, 102, 255, 0.5)").drawRect(-3, -8, 6, 16)
                                    .beginFill("#ff66ff").drawRect(-1, -6, 2, 12);
                                eb.x = boss.x; eb.y = boss.y + 40;
                                eb.vx = Math.cos(a) * 3;
                                eb.vy_override = Math.sin(a) * 3;  //custom y velocity
                                stage.addChild(eb);
                                enemyBullets.push(eb);
                            }
                            if (Math.random() < 0.3) sfxEnemyShoot();
                        }
                    } else if (bossPhase === 3) {
                        //rage mode — aimed shot at player + triple spread
                        if (bossPatternTimer > 18) {
                            bossPatternTimer = 0;
                            //aimed
                            const dx = player.x - boss.x;
                            const dy = player.y - boss.y;
                            const d = Math.sqrt(dx*dx + dy*dy);
                            const aimedBullet = new createjs.Shape();
                            aimedBullet.graphics
                                .beginFill("rgba(255, 0, 100, 0.6)").drawRect(-3, -8, 6, 16)
                                .beginFill("#ff0066").drawRect(-1, -6, 2, 12);
                            aimedBullet.x = boss.x; aimedBullet.y = boss.y + 40;
                            aimedBullet.vx = (dx / d) * 5;
                            aimedBullet.vy_override = (dy / d) * 5;
                            stage.addChild(aimedBullet);
                            enemyBullets.push(aimedBullet);
                            //triple
                            for (let i = -1; i <= 1; i++) {
                                const eb = new createjs.Shape();
                                eb.graphics
                                    .beginFill("rgba(255, 102, 255, 0.5)").drawRect(-3, -8, 6, 16)
                                    .beginFill("#ff66ff").drawRect(-1, -6, 2, 12);
                                eb.x = boss.x + i * 30;
                                eb.y = boss.y + 40;
                                eb.vx = i * 1.5;
                                stage.addChild(eb);
                                enemyBullets.push(eb);
                            }
                            sfxEnemyShoot();
                        }
                    }
                }

                //player bullets
                for (let i = bullets.length - 1; i >= 0; i--) {
                    bullets[i].y -= 10;
                    if (bullets[i].y < -20) {
                        stage.removeChild(bullets[i]);
                        bullets.splice(i, 1);
                        if (combo > 0) { combo = 0; comboText.text = ""; }
                    }
                }

                //enemy bullets
                for (let i = enemyBullets.length - 1; i >= 0; i--) {
                    if (enemyBullets[i].vy_override !== undefined) {
                        enemyBullets[i].y += enemyBullets[i].vy_override;
                    } else {
                        enemyBullets[i].y += 6;
                    }
                    if (enemyBullets[i].vx) enemyBullets[i].x += enemyBullets[i].vx;

                    if (enemyBullets[i].y > 560 || enemyBullets[i].y < -20 ||
                        enemyBullets[i].x < -20 || enemyBullets[i].x > 740) {
                        stage.removeChild(enemyBullets[i]);
                        enemyBullets.splice(i, 1);
                        continue;
                    }
                    if (Math.abs(enemyBullets[i].x - player.x) < 20 &&
                        Math.abs(enemyBullets[i].y - player.y) < 12) {
                        stage.removeChild(enemyBullets[i]);
                        enemyBullets.splice(i, 1);
                        if (powerupActive === "shield") {
                            spawnExplosion(player.x, player.y, "#39ff14", 8);
                            sfxEnemyHit();
                        } else {
                            lives--;
                            livesText.text = "Lives: " + lives;
                            sfxPlayerHit();
                            shakeAmount = 12;
                            spawnExplosion(player.x, player.y, "#39ff14", 18);
                            combo = 0; comboText.text = "";
                            if (lives <= 0) endGame(false);
                        }
                    }
                }

                //bullet vs UFO
                if (ufo) {
                    for (let i = bullets.length - 1; i >= 0; i--) {
                        if (Math.abs(bullets[i].x - ufo.x) < 25 &&
                            Math.abs(bullets[i].y - ufo.y) < 12) {
                            spawnExplosion(ufo.x, ufo.y, "#ff66ff", 30);
                            stage.removeChild(bullets[i]);
                            bullets.splice(i, 1);
                            stage.removeChild(ufo);
                            score += 200;
                            scoreText.text = "Score: " + score;
                            spawnPopup(ufo.x, ufo.y, "+200!", "#ff66ff");
                            sfxWaveClear();
                            shakeAmount = 6;
                            ufo = null;
                            break;
                        }
                    }
                }

                //bullet vs BOSS
                if (boss) {
                    for (let i = bullets.length - 1; i >= 0; i--) {
                        if (Math.abs(bullets[i].x - boss.x) < 90 &&
                            Math.abs(bullets[i].y - boss.y) < 45) {
                            spawnExplosion(bullets[i].x, bullets[i].y, "#ff66ff", 6);
                            stage.removeChild(bullets[i]);
                            bullets.splice(i, 1);
                            boss.hp--;
                            sfxBossHit();
                            shakeAmount = 3;
                            boss.bar.scaleX = boss.hp / boss.maxHp;

                            if (boss.hp <= 0) {
                                spawnExplosion(boss.x, boss.y, "#ff66ff", 80);
                                spawnShockwave(boss.x, boss.y, "#ff66ff");
                                shakeAmount = 30;
                                stage.removeChild(boss);
                                stage.removeChild(boss.bar);
                                stage.removeChild(boss.barBg);
                                score += 1000;
                                scoreText.text = "Score: " + score;
                                spawnPopup(boss.x, boss.y, "+1000!", "#ff66ff");
                                boss = null;
                                setTimeout(() => endGame(true), 1500);
                            }
                            break;
                        }
                    }
                }

                //bullet vs enemies
                for (let i = bullets.length - 1; i >= 0; i--) {
                    for (let j = enemies.length - 1; j >= 0; j--) {
                        if (Math.abs(bullets[i].x - enemies[j].x) < 17 &&
                            Math.abs(bullets[i].y - enemies[j].y) < 18) {
                            const e = enemies[j];
                            spawnExplosion(e.x, e.y, e.color, 12);
                            if (Math.random() < 0.2) spawnPowerup(e.x, e.y);
                            stage.removeChild(bullets[i]);
                            stage.removeChild(e);
                            enemies.splice(j, 1);
                            bullets.splice(i, 1);
                            combo++;
                            const comboBonus = combo > 1 ? combo : 1;
                            const points = e.points * comboBonus;
                            score += points;
                            scoreText.text = "Score: " + score;
                            spawnPopup(e.x, e.y - 10, "+" + points, e.color);
                            if (combo > 1) {
                                comboText.text = "x" + combo + " COMBO!";
                                sfxCombo(combo);
                            } else comboText.text = "";
                            sfxEnemyHit();
                            enemySpeed = 1 + (24 - enemies.length) * 0.4;
                            break;
                        }
                    }
                }
            }

            stage.update();
        }

        createjs.Ticker.on('tick', tick);
    </script>
